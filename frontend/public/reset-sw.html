<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset de Cache</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #121212;
        color: #e8e8e8;
      }
      main {
        width: min(92vw, 30rem);
        border: 1px solid #2b2b2b;
        border-radius: 16px;
        padding: 20px;
        background: #1a1a1a;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }
      p {
        margin: 8px 0;
        color: #bdbdbd;
        line-height: 1.4;
      }
      .ok {
        color: #2ecc71;
      }
      .warn {
        color: #d4af37;
      }
      a {
        color: #d4af37;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Reset de cache e Service Worker</h1>
      <p id="status" class="warn">Limpando dados do site...</p>
      <p>Depois, volte para o painel:</p>
      <p>
        <a id="dashboard-link" href="/pages/Dashboard">/pages/Dashboard</a>
      </p>
    </main>
    <script>
      (async function () {
        const status = document.getElementById("status");
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const keys = await window.caches.keys();
            await Promise.all(keys.map((key) => window.caches.delete(key)));
          }

          status.textContent = "Cache limpo com sucesso. Abra o dashboard novamente.";
          status.className = "ok";
        } catch (error) {
          status.textContent = "Não foi possível limpar tudo automaticamente. Recarregue a página.";
          status.className = "warn";
          console.error(error);
        }
      })();
    </script>
  </body>
</html>
